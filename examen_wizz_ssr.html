<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examen SSR Wizz Air</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .header { background: #185FA5; color: #fff; padding: 20px 16px 16px; text-align: center; }
  .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .header p { font-size: 13px; opacity: 0.85; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.3); }
  .progress-fill { height: 4px; background: #fff; transition: width 0.3s; }
  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e4; padding: 16px; margin-bottom: 14px; }
  .q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .q-num { font-size: 12px; color: #888; font-weight: 500; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 500; }
  .badge-ssr { background: #E6F1FB; color: #0C447C; }
  .badge-bag { background: #FAEEDA; color: #633806; }
  .badge-ass { background: #E1F5EE; color: #085041; }
  .badge-wch { background: #FBEAF0; color: #72243E; }
  .q-text { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 14px; color: #111; }
  .choice { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1.5px solid #e8e8e4; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; user-select: none; -webkit-tap-highlight-color: transparent; }
  .choice:active { transform: scale(0.98); }
  .choice.selected { border-color: #185FA5; background: #EBF4FF; }
  .choice.correct { border-color: #1D9E75; background: #E1F5EE; }
  .choice.wrong { border-color: #D85A30; background: #FAECE7; }
  .choice-dot { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .choice.selected .choice-dot { border-color: #185FA5; background: #185FA5; }
  .choice.correct .choice-dot { border-color: #1D9E75; background: #1D9E75; }
  .choice.wrong .choice-dot { border-color: #D85A30; background: #D85A30; }
  .choice-dot-inner { width: 8px; height: 8px; border-radius: 50%; background: #fff; opacity: 0; }
  .choice.selected .choice-dot-inner,
  .choice.correct .choice-dot-inner,
  .choice.wrong .choice-dot-inner { opacity: 1; }
  .choice-label { font-size: 14px; color: #1a1a1a; line-height: 1.3; }
  .choice.correct .choice-label { color: #085041; font-weight: 500; }
  .choice.wrong .choice-label { color: #712B13; }
  .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
  .btn-primary { background: #185FA5; color: #fff; }
  .btn-primary:hover { background: #0C447C; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-outline { background: #fff; color: #185FA5; border: 1.5px solid #185FA5; margin-top: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .score-section { text-align: center; padding: 28px 16px 20px; }
  .score-big { font-size: 56px; font-weight: 700; line-height: 1; }
  .score-pct { font-size: 16px; color: #666; margin-top: 6px; }
  .score-msg { font-size: 14px; margin-top: 12px; padding: 10px 16px; border-radius: 10px; font-weight: 500; }
  .r-item { padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; border: 1px solid; }
  .r-ok { border-color: #0F6E56; background: #E1F5EE; }
  .r-ko { border-color: #993C1D; background: #FAECE7; }
  .r-ok .rq { color: #085041; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .r-ko .rq { color: #712B13; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .r-ok .ra { color: #0F6E56; font-size: 12px; }
  .r-ko .ra { color: #993C1D; font-size: 12px; }
  .section { display: none; }
  .section.active { display: block; }
  .sticky-btn { position: sticky; bottom: 0; background: #f5f5f0; padding: 12px 0 16px; }
  .answered-count { font-size: 13px; color: #888; text-align: center; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>Examen SSR &amp; Bagages</h1>
  <p>Wizz Air — 15 questions</p>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="container">
  <div id="section-exam" class="section active">
    <div id="questions-list"></div>
    <div class="sticky-btn">
      <button class="btn btn-primary" id="submit-btn" onclick="submitExam()">Soumettre les réponses</button>
      <div class="answered-count" id="answered-count">0 / 15 répondues</div>
    </div>
  </div>

  <div id="section-results" class="section">
    <div class="card score-section" id="score-display"></div>
    <div id="results-detail"></div>
    <button class="btn btn-outline" onclick="retryExam()">Recommencer l'examen</button>
    <div style="height:24px"></div>
  </div>
</div>

<script>
const questions = [
  { id:1, cat:'SSR', badge:'badge-ssr', text:'Que signifie le code SSR CHKA sur Wizz Air ?', choices:['Check-in automatique gratuit','Check-in payant à 45€','Check-in aéroport gratuit','Bagage cabine inclus'], correct:1 },
  { id:2, cat:'SSR', badge:'badge-ssr', text:'Que signifie OLCI ?', choices:['Oxygen Level Check In','Online check-in payant (si pas fait en ligne)','Online check-in automatique','Airport check-in prioritaire'], correct:1 },
  { id:3, cat:'SSR', badge:'badge-ssr', text:'Quel code correspond au check-in aéroport ?', choices:['AUCI','CHKA','APCI','OLCI'], correct:2 },
  { id:4, cat:'SSR', badge:'badge-ssr', text:'Que représente le code AUCI ?', choices:['Airport check-in urgent','Online check-in payant','Online automatique check-in','Bagage excédent check-in'], correct:2 },
  { id:5, cat:'SSR', badge:'badge-ssr', text:'Que signifie BEXC ?', choices:['Bagage excédent','Boarding extra','Bagage 20 kg x1','Extra seat'], correct:0 },
  { id:6, cat:'SSR', badge:'badge-ssr', text:'Que signifie le code EXST ?', choices:['Extra storage','Extra seat','Exit seat','Extended stay'], correct:1 },
  { id:7, cat:'SSR', badge:'badge-ssr', text:'Que signifie PRBA ?', choices:['Priority baggage','Priority boarding','Pre-reserved bag','Premium boarding allowance'], correct:1 },
  { id:8, cat:'SSR', badge:'badge-ssr', text:'Que signifie SRVA ?', choices:['Service avion','Service animal','Seat reservation','Special request via airport'], correct:1 },
  { id:9, cat:'Bagages', badge:'badge-bag', text:'Quelles sont les dimensions du trolley cabine sur Wizz Air ?', choices:['40x30x20 cm','55x40x20 cm','55x40x23 cm','60x40x25 cm'], correct:2 },
  { id:10, cat:'Bagages', badge:'badge-bag', text:'Quelles sont les dimensions du petit bagage (petit bag) sur Wizz Air ?', choices:['55x40x23 cm','45x35x20 cm','40x30x20 cm','35x25x15 cm'], correct:2 },
  { id:11, cat:'Assistance', badge:'badge-ass', text:'Sur un A320, combien de WCHC maximum peut-on accepter par vol ?', choices:['8','10','12','15'], correct:1 },
  { id:12, cat:'Assistance', badge:'badge-ass', text:'Sur un A320, quel est le nombre maximum de duos assistance par vol ?', choices:['20','24','28','32'], correct:2 },
  { id:13, cat:'Assistance', badge:'badge-ass', text:'Sur un A321, combien de WCHC maximum peut-on accepter par vol ?', choices:['10','12','14','16'], correct:1 },
  { id:14, cat:'Fauteuil roulant', badge:'badge-wch', text:'Quel type de batterie pour fauteuil roulant est INTERDIT en soute sur Wizz Air ?', choices:['Batterie gel','Batterie lithium démontée','Batterie sèche','Batterie mouillée'], correct:3 },
  { id:15, cat:'Fauteuil roulant', badge:'badge-wch', text:'Quelle batterie de fauteuil roulant est acceptée si elle est démontée ?', choices:['Batterie mouillée','Batterie gel','Batterie lithium','Batterie sèche'], correct:2 }
];

const answers = {};

function renderExam() {
  const list = document.getElementById('questions-list');
  list.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'q-card-' + q.id;
    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Question ${qi+1} / ${questions.length}</span>
        <span class="badge ${q.badge}">${q.cat}</span>
      </div>
      <div class="q-text">${q.text}</div>
    `;
    q.choices.forEach((c, ci) => {
      const row = document.createElement('div');
      row.className = 'choice' + (answers[q.id] === ci ? ' selected' : '');
      row.id = `q${q.id}c${ci}`;
      row.innerHTML = `<div class="choice-dot"><div class="choice-dot-inner"></div></div><span class="choice-label">${c}</span>`;
      row.addEventListener('click', () => selectAnswer(q.id, ci));
      card.appendChild(row);
    });
    list.appendChild(card);
  });
  updateProgress();
}

function selectAnswer(qId, ci) {
  answers[qId] = ci;
  questions.find(q => q.id === qId).choices.forEach((_, i) => {
    const el = document.getElementById(`q${qId}c${i}`);
    if (el) el.className = 'choice' + (i === ci ? ' selected' : '');
  });
  updateProgress();
}

function updateProgress() {
  const count = Object.keys(answers).length;
  const pct = Math.round((count / questions.length) * 100);
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('answered-count').textContent = count + ' / ' + questions.length + ' répondues';
}

function submitExam() {
  let score = 0;
  const details = [];
  questions.forEach(q => {
    const sel = answers[q.id];
    const correct = sel !== undefined && sel === q.correct;
    if (correct) score++;
    details.push({ text: q.text, correct, answered: sel !== undefined, correctAnswer: q.choices[q.correct], userAnswer: sel !== undefined ? q.choices[sel] : null });
  });
  const pct = Math.round((score / questions.length) * 100);
  const color = pct >= 70 ? '#1D9E75' : pct >= 50 ? '#BA7517' : '#D85A30';
  const msg = pct >= 70 ? { bg:'#E1F5EE', color:'#085041', text:'Bien joué ! Continue comme ça.' } : pct >= 50 ? { bg:'#FAEEDA', color:'#633806', text:'Pas mal, encore un peu de révisions !' } : { bg:'#FAECE7', color:'#712B13', text:'Il faut réviser encore un peu.' };
  document.getElementById('score-display').innerHTML = `
    <div class="score-big" style="color:${color}">${score}/${questions.length}</div>
    <div class="score-pct">${pct}% de bonnes réponses</div>
    <div class="score-msg" style="background:${msg.bg};color:${msg.color}">${msg.text}</div>
  `;
  let html = '';
  details.forEach((d, i) => {
    html += `<div class="r-item ${d.correct ? 'r-ok' : 'r-ko'}">
      <div class="rq">${i+1}. ${d.text}</div>
      <div class="ra">${d.correct ? '✓ ' + d.correctAnswer : (d.answered ? '✗ ' + d.userAnswer + ' → ' + d.correctAnswer : '— Sans réponse → ' + d.correctAnswer)}</div>
    </div>`;
  });
  document.getElementById('results-detail').innerHTML = html;
  document.getElementById('section-exam').classList.remove('active');
  document.getElementById('section-results').classList.add('active');
  document.getElementById('progress').style.width = '100%';
  window.scrollTo(0, 0);
}

function retryExam() {
  Object.keys(answers).forEach(k => delete answers[k]);
  document.getElementById('section-results').classList.remove('active');
  document.getElementById('section-exam').classList.add('active');
  renderExam();
  window.scrollTo(0, 0);
}

renderExam();
</script>
</body>
</html>
